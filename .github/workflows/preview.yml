name: EAS Preview

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Create EAS Preview
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Create preview update
        run: eas update --branch=pr-${{ github.event.number }} --message="PR #${{ github.event.number }} preview"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📱 **EAS Preview Ready**\n\nScan the QR code in Expo Go or use the link:\n\n\`exp://u.expo.dev/update/pr-${{ github.event.number }}\`\n\nThis preview will be updated with each new commit.`
            })
